version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: whatsapp-postgres
    environment:
      POSTGRES_USER: whatsappuser
      POSTGRES_PASSWORD: changeme123
      POSTGRES_DB: whatsappdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whatsapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsappuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whatsapp-redis
    ports:
      - "6379:6379"
    networks:
      - whatsapp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: whatsapp-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: whatsappuser
      DB_PASSWORD: changeme123
      DB_NAME: whatsappdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-key-change-in-production
      PORT: 8080
      GIN_MODE: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - whatsapp-network

  frontend:
    build: ./frontend
    container_name: whatsapp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - whatsapp-network

networks:
  whatsapp-network:
    driver: bridge

volumes:
  postgres_data:
